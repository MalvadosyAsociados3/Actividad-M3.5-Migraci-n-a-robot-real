# =============================================================================
#  nav2_params_real.yaml  —  Puzzlebot Nav2 (ROBOT FISICO)
# -----------------------------------------------------------------------------
#  Diferencias clave vs simulacion (puzzlebot_navigation2/config/nav2_params.yaml):
#
#  1. use_sim_time: false       (sin reloj de Gazebo)
#  2. Topics y frames REALES    (LiDAR, odom, base_footprint)
#  3. Modelo de ruido AMCL      mas alto (odometria real es ruidosa)
#  4. Velocidades CONSERVADORAS (seguridad fisica)
#  5. Tolerancias mas amplias   (latencia y deriva real)
#  6. transform_tolerance mayor (latencia de TF en red WiFi/micro-ROS)
#  7. update_frequency conservadora (CPU del Jetson Nano)
#
#  Frames: base_footprint en todo el stack (consistente con URDF y AMCL)
# =============================================================================


# ============================================================================
#  AMCL — Localizacion (robot fisico)
# ============================================================================
amcl:
  ros__parameters:
    use_sim_time: false

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan
    tf_broadcast: true
    transform_tolerance: 2.0      # mayor en robot real (latencia WiFi/microROS)

    # Ruido del modelo de movimiento — MAS ALTO en robot real:
    # los encoders del Puzzlebot tienen deriva y ruido reales.
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    update_min_d: 0.10            # actualiza AMCL mas seguido (cada 10cm)
    update_min_a: 0.10            # actualiza AMCL mas seguido (cada ~6 grados)

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0     # RPLiDAR A1 alcanza ~12 m
    laser_min_range: 0.15     # min real del RPLiDAR A1
    max_beams: 60

    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1

    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    save_pose_rate: 0.5

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false


# ============================================================================
#  BT NAVIGATOR
# ============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    default_bt_xml_filename: navigate_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false


# ============================================================================
#  CONTROLLER SERVER  (RPP)
#  Velocidades conservadoras para hardware real
# ============================================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0    # menor que sim (CPU Jetson)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5        # mayor tolerancia: hardware real falla mas
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30      # mas amplia: rotacion fisica imprecisa

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Velocidades fisicas SEGURAS (mas bajas que en sim)
      desired_linear_vel: 0.15
      max_angular_accel: 1.2
      rotate_to_heading_angular_vel: 0.5

      lookahead_dist: 0.40
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.50
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true   # adapta lookahead a velocidad actual

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5

      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.4    # frena antes en curvas cerradas
      regulated_linear_scaling_min_speed: 0.05    # velocidad minima en curvas

      use_cost_regulated_linear_velocity_scaling: true

      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.3

      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.5

      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      transform_tolerance: 2.0      # debe ser >= al de AMCL

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


# ============================================================================
#  LOCAL COSTMAP — solo obstacle_layer (RPLiDAR A1 es 2D)
# ============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0       # menor que sim para no saturar CPU del robot
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      # Footprint real del Puzzlebot fisico (0.20 x 0.191 m)
      footprint: "[[0.10, 0.0955], [0.10, -0.0955], [-0.10, -0.0955], [-0.10, 0.0955]]"
      footprint_padding: 0.03    # ligeramente mayor en real por imprecision

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.5       # muy bajo = costo decae lento = fuerza al centro del pasillo
        inflation_radius: 0.10         # pasillo=60cm, 0.20*2=40cm, deja 20cm libres en centro

      always_send_full_costmap: True

  local_costmap_client:
    ros__parameters:
      use_sim_time: false
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false


# ============================================================================
#  GLOBAL COSTMAP
# ============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: false

      footprint: "[[0.10, 0.0955], [0.10, -0.0955], [-0.10, -0.0955], [-0.10, 0.0955]]"
      footprint_padding: 0.03

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.5       # muy bajo = costo decae lento = fuerza al centro del pasillo
        inflation_radius: 0.12         # pasillo=60cm, 0.20*2=40cm, deja 20cm libres en centro

      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: false
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false


# ============================================================================
#  MAP SERVER
# ============================================================================
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


# ============================================================================
#  PLANNER SERVER
# ============================================================================
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 15.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5              # mas tolerante para goals cerca de paredes
      use_astar: true
      allow_unknown: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


# ============================================================================
#  RECOVERIES
# ============================================================================
recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_timeout: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.4       # giro lento para no perder localizacion
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0       # aceleracion suave


robot_state_publisher:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2000
