slam_toolbox:
  ros__parameters:

    # ── Solver ──────────────────────────────────────────────────────────────
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ── Frame IDs ────────────────────────────────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true

    # ── Mode: mapping (online_async) ─────────────────────────────────────────
    mode: mapping

    # ── Timing ───────────────────────────────────────────────────────────────
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02       # seconds between TF publishes
    map_update_interval: 5.0             # seconds between /map topic updates
    minimum_time_interval: 0.5           # min time (s) between processed scans

    # ── Map resolution (must match existing MapaHector.yaml = 0.05) ──────────
    resolution: 0.05
    max_laser_range: 5.0                 # metres — set to maze size, not sensor max

    # ── TF buffer ────────────────────────────────────────────────────────────
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # ── Scan matching ────────────────────────────────────────────────────────
    use_scan_matching: true
    use_scan_barycenter: true
    # Antes: 0.05 / 0.05 — procesaba scan cada 5 cm, demasiado frecuente en
    # laberinto con pasillos parecidos (causaba matches falsos). Subido a 0.10
    # para dar tiempo a que la odometria acumule senal distintiva.
    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.10

    scan_buffer_size: 20                 # mas historia para comparar
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.15   # antes 0.1 — mas exigente
    link_scan_maximum_distance: 1.5

    # ── Loop closure (endurecido para evitar teletransportes) ───────────────
    # Los pasillos del laberinto se parecen entre si. Con thresholds bajos,
    # SLAM confunde un pasillo con otro y hace "loop closure falso", snappeando
    # el robot al otro pasillo -> teletransporte.
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 15         # antes 10 - necesita mas evidencia
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.55  # antes 0.35 - mas estricto
    loop_match_minimum_response_fine: 0.65    # antes 0.45 - mas estricto

    # ── Correlation search ───────────────────────────────────────────────────
    # correlation_search_space_dimension reducido de 0.5 a 0.3 para limitar
    # cuanto puede "saltar" SLAM al buscar el mejor match en cada scan.
    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ── Penalties (subidas para castigar saltos grandes) ────────────────────
    distance_variance_penalty: 1.5       # antes 0.5 - penaliza mas saltos
    angle_variance_penalty: 2.0          # antes 1.0 - idem con rotaciones

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # ── Interactive mode (allows map editing after mapping) ─────────────────
    enable_interactive_mode: true
