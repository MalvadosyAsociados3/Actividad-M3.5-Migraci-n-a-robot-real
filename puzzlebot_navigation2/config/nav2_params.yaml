# =============================================================================
#  nav2_params.yaml  —  Puzzlebot Nav2 (SIMULACION en Gazebo)
# -----------------------------------------------------------------------------
#  Puzzlebot REAL:
#    - Footprint:     0.20 m (largo) x 0.191 m (ancho)
#    - Radio circunscrito: ~0.138 m (sqrt(0.10^2 + 0.0955^2))
#    - Pasillos del laberinto: 60 cm
#    - LiDAR: RPLiDAR A1 (2D), 360 grados, rango 0.15 - 12 m
#
#  Frames: en todo el stack se usa base_footprint (consistente con AMCL)
#
#  Para el robot fisico ver: puzzlebot_real_robot/config/nav2_params_real.yaml
# =============================================================================


# ============================================================================
#  AMCL  —  Localizacion probabilistica
# ============================================================================
amcl:
  ros__parameters:
    use_sim_time: True

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan
    tf_broadcast: true
    transform_tolerance: 0.5

    # Ruido del modelo de movimiento.
    # En simulacion la odometria es casi perfecta -> valores bajos.
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    max_particles: 1500
    min_particles: 300
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    update_min_d: 0.20      # robot mas grande -> 20 cm entre updates
    update_min_a: 0.20

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0   # RPLiDAR A1 alcanza ~12 m
    laser_min_range: 0.15   # min real del RPLiDAR A1
    max_beams: 60

    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1

    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    save_pose_rate: 0.5

amcl_map_client:
  ros__parameters:
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  BT NAVIGATOR
#  Frame del robot: base_footprint (consistente con AMCL y costmaps)
# ============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    default_bt_xml_filename: navigate_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  CONTROLLER SERVER  (Regulated Pure Pursuit)
#  Robot real 0.20 x 0.191 m en pasillos de 60 cm
# ============================================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3   # ~1.5x ancho del robot
      movement_time_allowance: 10.0

    # Tolerancias acordes al tamano del robot (0.20 x 0.191 m).
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Velocidades acordes al Puzzlebot fisico
      desired_linear_vel: 0.20
      max_angular_accel: 1.5
      rotate_to_heading_angular_vel: 0.7

      # Lookahead: ~2-3x el largo del robot (0.20 m)
      lookahead_dist: 0.50
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.70
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5

      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.7
      regulated_linear_scaling_min_speed: 0.08

      use_cost_regulated_linear_velocity_scaling: true

      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.3

      # Rotate to heading: para diff-drive en pasillos de 60 cm con robot
      # de ~20 cm de ancho, conviene detenerse y girar en curvas > 30 grados.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.5

      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      transform_tolerance: 0.3

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  LOCAL COSTMAP
#  - Solo obstacle_layer (no voxel_layer): el LiDAR es 2D (RPLiDAR A1).
#  - Footprint del robot real (no robot_radius).
#  - Frame del robot: base_footprint (consistente con AMCL y bt_navigator).
# ============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      # Footprint en lugar de robot_radius: refleja la geometria rectangular
      # real del Puzzlebot (0.20 largo x 0.191 ancho).
      # Lista de [x, y] en el frame del robot, sentido antihorario.
      footprint: "[[0.10, 0.0955], [0.10, -0.0955], [-0.10, -0.0955], [-0.10, 0.0955]]"
      footprint_padding: 0.02

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        # Pasillo 60 cm - robot 19.1 cm = ~20 cm de margen por lado.
        # inflation_radius = robot_radius (0.14) + buffer = 0.20 m.
        inflation_radius: 0.20

      always_send_full_costmap: True

  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ============================================================================
#  GLOBAL COSTMAP
# ============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: false   # mapa cerrado: no permitir planear en lo desconocido

      footprint: "[[0.10, 0.0955], [0.10, -0.0955], [-0.10, -0.0955], [-0.10, 0.0955]]"
      footprint_padding: 0.02

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.20

      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ============================================================================
#  MAP SERVER / SAVER
# ============================================================================
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


# ============================================================================
#  PLANNER SERVER
#  - use_astar: true (A* en vez de Dijkstra)
#  - allow_unknown: false (mapa cerrado, no debe haber zonas desconocidas)
# ============================================================================
planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  RECOVERIES
#  Frame del robot: base_footprint (consistente con todo el stack)
# ============================================================================
recoveries_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.3
    rotational_acc_lim: 2.0


robot_state_publisher:
  ros__parameters:
    use_sim_time: True


waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2000
